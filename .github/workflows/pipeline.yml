name: Engine Health Project Pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python model_building/prep.py


model-traning:
  needs: data-prep
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v3
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Start MLflow Server
      run: |
        nohup mlflow ui --host 0.0.0.0 --port 5000 > mlflow.log 2>&1 &
        sleep 10

    - name: Start ngrok Tunnel
      env:
        NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
      run: |
        ngrok config add-authtoken $NGROK_TOKEN
        nohup ngrok http 5000 > ngrok.log 2>&1 &
        sleep 10

    - name: Display MLflow URL
      run: |
        curl -s http://127.0.0.1:4040/api/tunnels
    - name: Model Building
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python model_building/train.py
